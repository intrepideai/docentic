name: 'docentic'
description: 'Validate that a repo follows the docentic agent-friendly template — runs `docentic check` against your codebase.'
author: 'Intrepide'

branding:
  icon: 'book-open'
  color: 'purple'

inputs:
  path:
    description: 'Path to the repo to check (default: ${{ github.workspace }})'
    required: false
    default: '.'
  warnings-as-errors:
    description: 'Fail the action on warnings, not just errors'
    required: false
    default: 'false'
  json:
    description: 'Emit JSON instead of human-readable output (useful for piping)'
    required: false
    default: 'false'
  node-version:
    description: 'Node.js version to install (>= 20)'
    required: false
    default: '20'
  version:
    description: 'docentic version to run (npm spec — defaults to latest published)'
    required: false
    default: '@intrepideai/docentic'

outputs:
  ok:
    description: '"true" if the check passed cleanly, "false" otherwise'
    value: ${{ steps.docentic-check.outputs.ok }}

runs:
  using: 'composite'
  steps:
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Run docentic check
      id: docentic-check
      shell: bash
      run: |
        ARGS=()
        if [ "${{ inputs.warnings-as-errors }}" = "true" ]; then
          ARGS+=("--warnings-as-errors")
        fi
        if [ "${{ inputs.json }}" = "true" ]; then
          ARGS+=("--json")
        fi

        set +e
        npx -y "${{ inputs.version }}" check "${{ inputs.path }}" "${ARGS[@]}"
        code=$?
        set -e

        if [ $code -eq 0 ]; then
          echo "ok=true" >> "$GITHUB_OUTPUT"
        else
          echo "ok=false" >> "$GITHUB_OUTPUT"
          exit $code
        fi
