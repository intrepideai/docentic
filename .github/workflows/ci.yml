name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lower bound matches package.json engines.node (>=20). Upper bound
        # tracks current LTS so we catch breakage on the version most users
        # actually have installed.
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck + build
        run: npm run build

      - name: Unit + CLI integration tests
        run: npm test

      - name: Smoke test — dry run against a fresh repo
        run: |
          TESTDIR=$(mktemp -d)
          cd "$TESTDIR"
          git init -q
          git config user.email "ci@example.com"
          git config user.name "CI"
          echo '{"name":"smoke","dependencies":{"next":"^15","react":"^18","@prisma/client":"^6"}}' > package.json
          echo '{"compilerOptions":{}}' > tsconfig.json
          mkdir prisma && echo 'datasource db {provider="mysql"}' > prisma/schema.prisma
          git add -A && git commit -q -m "init"
          node "$GITHUB_WORKSPACE/dist/cli.js" init "$TESTDIR" --dry-run

      - name: Smoke test — actual scaffold
        run: |
          TESTDIR=$(mktemp -d)
          cd "$TESTDIR"
          git init -q
          git config user.email "ci@example.com"
          git config user.name "CI"
          echo '{"name":"smoke"}' > package.json
          git add -A && git commit -q -m "init"
          node "$GITHUB_WORKSPACE/dist/cli.js" init "$TESTDIR" --no-pr
          # Sanity check the output
          test -f AGENTS.md
          test -f docs/ARCHITECTURE.md
          test -f .agents/index.json
          test -f scripts/llm-docs/MAINTAIN.md
          test -x scripts/llm-docs/gen-stack.sh
          # Regression: detect-stack.sh must be scaffolded — every generator
          # sources it, so if it's missing they all fail at startup.
          test -f scripts/llm-docs/detect-stack.sh
          # Run generators end-to-end after a real init (an existence check alone
          # would miss sourcing/exec breakage).
          bash scripts/llm-docs/gen-stack.sh > /dev/null
          bash scripts/llm-docs/gen-api.sh > /dev/null
          bash scripts/llm-docs/gen-data.sh > /dev/null
          # Verify JSON is valid
          jq -e . .agents/index.json > /dev/null
          jq -e . research/index.json > /dev/null
          # Verify it committed on the expected branch
          test "$(git rev-parse --abbrev-ref HEAD)" = "docentic/template-scaffold"

          # Smoke test 3: docentic check passes against the scaffold
          node "$GITHUB_WORKSPACE/dist/cli.js" check "$TESTDIR"

          # Smoke test 4: docentic check exits non-zero when index.json is corrupt
          echo '{ broken' > "$TESTDIR/.agents/index.json"
          if node "$GITHUB_WORKSPACE/dist/cli.js" check "$TESTDIR" > /dev/null 2>&1; then
            echo "✗ docentic check should have failed on corrupt JSON"
            exit 1
          fi

          # Smoke test 5: --json mode produces valid JSON
          # Restore a minimal valid index first
          echo '{"version":1,"repo":"x","docs":[]}' > "$TESTDIR/.agents/index.json"
          node "$GITHUB_WORKSPACE/dist/cli.js" check "$TESTDIR" --json | jq -e . > /dev/null

          # Smoke test 6: docentic install --dry-run reports correct paths for both targets
          node "$GITHUB_WORKSPACE/dist/cli.js" install --claude --cursor --dry-run --force | grep -q "would install"

          # Smoke test 7: docentic install --cursor --project writes a real file
          INSTALL_TARGET=$(mktemp -d)
          node "$GITHUB_WORKSPACE/dist/cli.js" install --cursor --project "$INSTALL_TARGET" --force
          test -f "$INSTALL_TARGET/.cursor/rules/docentic.mdc"

          # Smoke test 8: docentic populate --dry-run works without an API key
          # (Restore the index that smoke test 5 mutated so populate sees a valid scaffold.)
          cd "$TESTDIR"
          node "$GITHUB_WORKSPACE/dist/cli.js" init "$TESTDIR" --no-commit --force > /dev/null
          node "$GITHUB_WORKSPACE/dist/cli.js" populate "$TESTDIR" --dry-run | grep -q "Dry run"

          # Smoke test 9: action.yml is valid YAML
          npx -y -p js-yaml@4 js-yaml "$GITHUB_WORKSPACE/action.yml" > /dev/null

          # Smoke test 10: fresh install from a sibling project produces a working binary
          # This catches the bug we hit where `npx @intrepideai/docentic` fetched the
          # repo but never ran the build, so dist/cli.js didn't exist. The `prepare`
          # script in package.json should fix that — verify here.
          SIBLING=$(mktemp -d)
          cd "$SIBLING"
          npm init -y > /dev/null
          npm install --silent "$GITHUB_WORKSPACE"
          test -x node_modules/.bin/docentic || (echo "✗ binary missing after install"; exit 1)
          node_modules/.bin/docentic --version | grep -q '^0\.'

          echo "✓ smoke tests passed"

      - name: Smoke test — gitignored AGENTS.md halts the scaffold (v0.1.1)
        run: |
          IGNORED=$(mktemp -d)
          cd "$IGNORED"
          git init -q
          git config user.email "ci@example.com"
          git config user.name "CI"
          echo '{"name":"ignored-smoke"}' > package.json
          # Force AGENTS.md (and the whole docs/ tree) into .gitignore to
          # reproduce the bug from the v0.1.0 install report.
          printf 'AGENTS.md\ndocs/\n' > .gitignore
          git add -A && git commit -q -m "init with gitignore"

          # Run 1: default behavior should hard-stop with a clear warning
          # and exit non-zero, and NOT have written AGENTS.md. Capture stdout
          # AND stderr — log.error goes to stderr but the file list goes to
          # stdout via log.list.
          if node "$GITHUB_WORKSPACE/dist/cli.js" init "$IGNORED" --no-commit > combined.log 2>&1; then
            echo "✗ init should have failed when AGENTS.md is gitignored"
            cat combined.log
            exit 1
          fi
          grep -q "would be ignored" combined.log || (echo "✗ missing gitignore warning"; cat combined.log; exit 1)
          grep -q "AGENTS.md" combined.log || (echo "✗ AGENTS.md should appear in ignored list"; cat combined.log; exit 1)
          test ! -f "$IGNORED/AGENTS.md" || (echo "✗ AGENTS.md should not have been written"; exit 1)

          # Run 2: --force-ignored writes the files anyway. (They'll still be
          # ignored by git, but the user opted in.)
          node "$GITHUB_WORKSPACE/dist/cli.js" init "$IGNORED" --no-commit --force-ignored > /dev/null
          test -f "$IGNORED/AGENTS.md" || (echo "✗ --force-ignored should have written AGENTS.md"; exit 1)

          echo "✓ gitignore smoke test passed"

      - name: Smoke test — spine-only mode (v0.1.1)
        run: |
          SPINE=$(mktemp -d)
          cd "$SPINE"
          git init -q
          git config user.email "ci@example.com"
          git config user.name "CI"
          echo '{"name":"spine-smoke"}' > package.json
          git add -A && git commit -q -m "init"

          node "$GITHUB_WORKSPACE/dist/cli.js" init "$SPINE" --no-commit --spine-only > /dev/null

          # Spine-only should keep these
          test -f "$SPINE/AGENTS.md" || (echo "✗ spine-only should have written AGENTS.md"; exit 1)
          test -f "$SPINE/docs/ARCHITECTURE.md" || (echo "✗ spine-only should have written docs/ARCHITECTURE.md"; exit 1)
          test -f "$SPINE/.agents/index.json" || (echo "✗ spine-only should have written .agents/index.json"; exit 1)

          # Spine-only should drop these
          test ! -d "$SPINE/research" || (echo "✗ spine-only should NOT have written research/"; exit 1)
          test ! -d "$SPINE/scripts/llm-docs" || (echo "✗ spine-only should NOT have written scripts/llm-docs/"; exit 1)
          test ! -d "$SPINE/.claude" || (echo "✗ spine-only should NOT have written .claude/"; exit 1)

          echo "✓ spine-only smoke test passed"

      - name: Smoke test — stack detection walks into apps/* (v0.1.1)
        run: |
          MONO=$(mktemp -d)
          cd "$MONO"
          git init -q
          git config user.email "ci@example.com"
          git config user.name "CI"
          # Outer root has nothing recognizable; real code lives under backend/.
          # Pre-v0.1.1 this would have produced a generic scaffold with no
          # framework/language signal.
          mkdir -p backend
          echo '{"name":"laravel-app","require":{"laravel/framework":"^11"}}' > backend/composer.json
          git add -A && git commit -q -m "init monorepo"

          # Capture output to verify framework + detectedIn surfaced
          node "$GITHUB_WORKSPACE/dist/cli.js" init "$MONO" --no-commit > out.log 2>&1
          grep -q "framework:.*laravel" out.log || (echo "✗ Laravel framework not detected from backend/composer.json"; cat out.log; exit 1)
          grep -q "detected in:.*backend" out.log || (echo "✗ 'detected in' should include backend"; cat out.log; exit 1)

          echo "✓ stack detection smoke test passed"

  shell-tests:
    # Unit tests for the templates/scripts/llm-docs/ generators. Runs both code
    # paths: the grep+sed fallback (what most machines hit) and the ripgrep path.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generator shell tests — grep fallback (ripgrep absent)
        run: |
          # Guarantee the grep+sed fallback is exercised by removing any rg.
          sudo rm -f "$(command -v rg 2>/dev/null)" 2>/dev/null || true
          command -v rg >/dev/null 2>&1 && echo "warning: rg still present" || echo "rg absent ✓"
          bash test/shell-scripts.sh

      - name: Generator shell tests — ripgrep present
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep
          rg --version | head -1
          bash test/shell-scripts.sh
