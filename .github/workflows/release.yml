name: release

# Publishes @intrepideai/docentic to npm.
#
# Triggers:
#   - pushing a version tag (e.g. `git tag v0.2.3 && git push origin v0.2.3`)
#   - manual run from the Actions tab (workflow_dispatch) — publishes whatever
#     version is currently in package.json on the selected ref.
#
# Requires a repo secret `NPM_TOKEN` (an npm automation/granular token with
# publish rights on @intrepideai/docentic). Add it with:
#   gh secret set NPM_TOKEN --repo intrepideai/docentic

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify the tag matches package.json (tag pushes only)
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=v$TAG  package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG — bump package.json or fix the tag."
            exit 1
          fi

      - name: Publish to npm
        # prepublishOnly also runs the build; --provenance attests the build on
        # public GitHub-hosted runners. Drop --provenance if your token type
        # doesn't support it.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
